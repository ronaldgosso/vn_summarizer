<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice Summarizer</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="ui/style.css" />

    <!-- Xenova Transformers.js -->
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0/dist/transformers.umd.js"></script>

    <!-- Notiflix -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/notiflix/dist/notiflix-3.2.6.min.css"
    />
  </head>
  <body class="d-flex flex-column min-vh-100 bg-dark text-light">
    <div class="container py-5">
      <h1 class="text-center mb-5 fw-bold text-info">
        🎧 Voice Notes Summarizer
      </h1>

      <!-- Model + Summarizer Selectors -->
      <div class="row g-4 mb-4 justify-content-center">
        <div class="col-md-4">
          <label for="modelSelect" class="form-label">Audio Transcriber</label>
          <select id="modelSelect" class="form-select">
            <option value="fast" selected>Fast</option>
            <option value="balanced">Balanced</option>
            <option value="accurate">Accurate</option>
          </select>
        </div>
        <div class="col-md-4">
          <label for="summarizerSelect" class="form-label">Summarizer</label>
          <select id="summarizerSelect" class="form-select">
            <option value="fast" selected>Fast (T5)</option>
            <option value="accurate">Accurate (DistilBART-CNN)</option>
          </select>
        </div>
      </div>

      <!-- Record / Upload -->
      <div class="card bg-secondary text-light shadow-lg mb-4">
        <div class="card-body text-center">
          <p class="mb-3">🎙️ Record or Upload an Audio File</p>
          <div class="d-flex flex-wrap justify-content-center gap-3">
            <button id="startBtn" class="btn btn-cyan">Start Recording</button>
            <button id="stopBtn" class="btn btn-danger" disabled>Stop</button>
            <span id="recordingIndicator" class="recording-dot d-none"></span>
            <input
              type="file"
              id="uploadInput"
              accept="audio/wav, audio/mpeg, audio/mp3, audio/webm"
              class="form-control"
              style="max-width: 280px"
            />
          </div>
          <span id="recordingIndicator" class="recording-dot d-none"></span>
        </div>
      </div>

      <!-- Audio Preview -->
      <div id="audioPreview" class="text-center d-none mb-4">
        <h5 class="mb-3">🎵 Audio Preview</h5>
        <audio id="audioPlayer" controls class="custom-audio-player"></audio>
        <button id="processUploadBtn" class="btn btn-cyan mt-3">
          Process Audio
        </button>
      </div>

      <!-- Summary Card -->
      <div class="card bg-dark border-info shadow-lg mb-4">
        <div class="card-body">
          <h4 class="card-title text-info">📝 Summary</h4>
          <p id="summaryText" class="mt-3 text-light">
            Your summary will appear here...
          </p>
          <button id="copyBtn" class="btn btn-outline-info btn-sm">
            📋 Copy
          </button>
        </div>
      </div>

      <!-- Previous Recordings -->
      <div id="recordingsSection" class="d-none">
        <h4 class="text-info">📂 Previous Recordings</h4>
        <div id="recordingsContainer" class="row g-3 mt-2"></div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer bg-dark-navy text-light py-4 mt-auto">
      <div class="container text-center">
        <p class="mb-2">
           Crafted by
          <span class="fw-bold">Coffee ☕️ & Ronald</span>
        </p>
        <div class="d-flex justify-content-center gap-3 mb-2">
          <a
            href="https://www.linkedin.com/in/ronald-isack-gosso/"
            target="_blank"
            class="footer-link"
            >LinkedIn</a
          >
          <a href="mailto:ronaldgosso@gmail.com" class="footer-link">Contact</a>
        </div>
        <small class="text-muted"
          >© <span id="year"></span> Ronald Gosso.</small
        >
      </div>
    </footer>
    <script>
      // Auto update year
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/notiflix"></script>
    <script type="module" src="logic/main.js"></script>
  </body>
</html>
