<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Voice Notes → Summarizer</title>
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="ui/style.css">

  <!-- Notiflix -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notiflix/dist/notiflix-3.2.6.min.css" />
</head>
<body class="bg-dark text-light">

<div class="container py-5">
  <h1 class="text-cyan text-center mb-4">AI Voice Notes → Summarizer</h1>

  <!-- Recorder Controls -->
  <div class="recorder mb-4 text-center">
    <button id="startBtn" class="btn btn-cyan me-2">🎙️ Start Recording</button>
    <button id="stopBtn" class="btn btn-secondary" disabled>⏹️ Stop</button>
    <span id="recordingIndicator" class="recording-dot"></span>
  </div>

  <!-- Summary Card -->
  <div class="output mb-4">
    <h2>Summary</h2>
    <div id="summaryCard" class="card bg-secondary text-light">
      <div class="card-body">
        <p id="summaryText">Your summary will appear here...</p>
        <button id="copyBtn" class="btn btn-dark btn-sm">📋 Copy</button>
      </div>
    </div>
  </div>

  <!-- Recordings Grid -->
  <div>
    <h2>Previous Recordings</h2>
    <div id="recordingsContainer" class="row g-3"></div>
  </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/notiflix"></script>
<script src="logic/main.js"></script>
</body>
</html>
