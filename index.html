<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice Summarizer</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="ui/style.css" />

    <!-- Xenova Transformers.js (browser build) -->
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0/dist/transformers.umd.js"></script>
    <!-- Google MT5 -->
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@xenova/transformers"
    ></script>
    <!-- Notiflix -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/notiflix/dist/notiflix-3.2.6.min.css"
    />
  </head>
  <body class="bg-dark text-light">
    <div class="container py-5">
      <h1 class="text-cyan text-center mb-4">Voice Notes Summarizer</h1>

      <!-- Model Selector -->
      <div class="mb-4 text-center">
        <label for="modelSelect" class="form-label"
          >Choose Audio Transcriber:</label
        >
        <select id="modelSelect" class="form-select w-auto d-inline-block">
          <option value="fast" selected>
            Fast
            <!-- (Whisper Tiny / Vosk Small) -->
          </option>
          <option value="balanced">
            Balanced
            <!-- (Whisper Base / Vosk Medium) -->
          </option>
          <option value="accurate">
            Accurate
            <!-- (Whisper Small / Medium) -->
          </option>
        </select>
      </div>

      <div class="mb-4 text-center">
        <label for="summarizerSelect" class="form-label"
          >Choose Summarizer:</label
        >
        <select id="summarizerSelect" class="form-select w-auto d-inline-block">
          <option value="fast" selected>
            Fast
            <!-- T5 -->
          </option>
          <option value="accurate">
            Accurate
            <!-- Xenova/distilbart-cnn-6-6 (Accurate, Multilingual) -->
          </option>
        </select>
      </div>

      <!-- Recorder Controls -->
      <div class="recorder mb-4 text-center">
        <p>
          <label for="summarizerSelect" class="form-label"
            >Record from your Browser or Upload a file</label
          >
        </p>
        <button id="startBtn" class="btn btn-cyan me-2">
          🎙️ Start Recording
        </button>
        <button id="stopBtn" class="btn btn-secondary" disabled>⏹️ Stop</button>
        <span id="recordingIndicator" class="recording-dot"></span>
      </div>
      <!-- Recording / Upload Controls -->
      <div class="card shadow-lg p-4 mb-4">
        <div
          class="d-flex flex-column flex-md-row gap-3 justify-content-center"
        >
          <!-- Upload -->
          <input
            type="file"
            id="uploadInput"
            accept="audio/wav, audio/mpeg, audio/mp3, audio/webm"
            class="form-control"
            style="max-width: 280px"
          />
        </div>
      </div>

      <!-- Audio Preview -->
      <div id="audioPreview" class="mb-4 text-center d-none">
        <h5 class="mb-3">Your Audio</h5>
        <audio id="audioPlayer" controls class="custom-audio-player"></audio>
        <button id="processUploadBtn" class="btn btn-cyan mt-3">
          Process Audio
        </button>
      </div>

      <!-- Summary Card -->
      <div class="output mb-4">
        <h2>Summary</h2>
        <div id="summaryCard" class="card bg-secondary text-light">
          <div class="card-body">
            <p id="summaryText">Your summary will appear here...</p>
            <button id="copyBtn" class="btn btn-dark btn-sm">📋 Copy</button>
          </div>
        </div>
      </div>

      <!-- Recordings Grid -->
      <div id="recordingsSection" class="d-none">
        <h2>Previous Recordings</h2>
        <div id="recordingsContainer" class="row g-3"></div>
      </div>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/notiflix"></script>
    <script type="module" src="logic/main.js"></script>
  </body>
</html>
